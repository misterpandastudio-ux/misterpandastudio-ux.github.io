<!doctype html>
<html lang="nl">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Website niet gevonden">
  <meta property="og:title" content="Pagina niet gevonden">
  <meta property="og:description" content="Website niet gevonden">
  <meta property="og:url" content="https://misterpandaaatje.nl">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Pagina niet gevonden">
  <meta name="twitter:description" content="Website niet gevonden">
  <meta http-equiv="content-language" content="nl">
  <link rel="canonical" href="https://misterpandaaatje.nl">
  <title>Pagina niet gevonden</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      font-size: 16px;
    }

    body {
      font-family: 'Be Vietnam Pro', sans-serif;
      font-style: normal;
      font-weight: normal;
      background-color: #ffffff;
      color: #231f20;
      font-size: 16px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a {
      font-weight: normal;
      text-decoration: underline;
      font-family: 'Be Vietnam Pro', sans-serif;
      color: #a9dcde;
    }

    a:hover,
    a:focus {
      color: #415239;
    }

    h1 {
      font-family: 'Be Vietnam Pro', sans-serif;
      font-weight: 700;
      color: #231f20;
      font-size: 40px;
    }

    p {
      font-family: 'Be Vietnam Pro', sans-serif;
    }

    .header {
      background-color: #ffffff;
      padding: 20px;
    }

    .header__wrapper {
      max-width: 1000px;
      margin: 0 auto;
      display: flex;
      align-items: center;
    }

    .header__logo-image {
      max-width: 200px;
      height: auto;
    }

    .content-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
    }

    .error-page {
      text-align: center;
    }

    .error-page h1 {
      margin-bottom: 16px;
    }

    .error-page p {
      margin-bottom: 24px;
    }

    .button {
      display: inline-block;
      border: 1px solid #76bf43;
      padding: 10px 20px;
      font-family: 'Be Vietnam Pro', sans-serif;
      font-weight: 600;
      text-decoration: none;
      background-color: #76bf43;
      border-radius: 4px;
      color: #ffffff;
      font-size: 16px;
      cursor: pointer;
    }

    .button:hover,
    .button:focus {
      background-color: #6ca444;
      color: #ffffff;
    }

    .footer {
      background-color: #ffffff;
      padding: 20px;
    }

    .footer hr {
      width: 100%;
      border: 0 none;
      border-bottom: 1px solid rgba(0, 0, 0, 1.0);
      margin: 0 auto;
    }

    .show-for-sr {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>

<body>
  <header class="header">
    <div class="header__wrapper">
      <a href="https://misterpandaaatje.nl">
        <img class="header__logo-image"
          src="https://misterpandaaatje.nl/misterpanda.png"
          loading="eager" alt="Logo" height="260" width="400">
      </a>
    </div>
  </header>

  <main id="main-content" class="content-wrapper">
    <section class="error-page">
      <h1>Pagina niet gevonden</h1>
      <p>We konden de door jou gezochte pagina niet vinden.</p>
      <a class="button" href="https://misterpandaaatje.nl">Naar startpagina</a>
    </section>
  </main>

  <footer class="footer">
    <hr>
  </footer>
</body>

</html>
